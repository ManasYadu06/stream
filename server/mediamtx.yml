logLevel: info
logDestinations: [stdout]

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsEncryption: no
hlsAlwaysRemux: no

rtsp: no
webrtc: no
srt: no

paths:
  "~^.*$":
    runOnReady: /usr/local/bin/mtx-record.sh $MTX_PATH
    runOnReadyRestart: yes
    runOnNotReady: /usr/local/bin/mtx-upload.sh $MTX_PATH
